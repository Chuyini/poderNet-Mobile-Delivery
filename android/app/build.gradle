plugins {
    id "com.android.application"
    id "kotlin-android"
    // El Plugin de Gradle para Flutter debe ser aplicado después de los plugins de Android y Kotlin.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.podernet"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        // TODO: Especifica tu propio ID de Aplicación único (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.example.podernet"
        // Puedes actualizar los siguientes valores para ajustarlos a las necesidades de tu aplicación.
        // Para más información, consulta: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Añade tu propia configuración de firma para el build de lanzamiento.
            // Usando las claves de debug por ahora, para que `flutter run --release` funcione.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
